version: "3.8"
services:
  nebula:
    build: .
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # REST
    volumes:
      - nebula-data:/data
      - nebula-keychain:/keychain
      - nebula-logs:/logs
    environment:
      - NEBULA_GRPC=1
      - NEBULA_REST=1
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

volumes:
  nebula-data:
  nebula-keychain:
  nebula-logs: