# v1.0.1 P0#02: enable Dependabot for the three dependency surfaces
# we ship (Rust crates in src-tauri, Node packages at the repo root,
# and the GitHub Actions we pin in .github/workflows/). Weekly cadence
# matches the cadence of the security audit job (see test.yml).
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    # Keep PRs reviewable — one Cargo update per week.
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    # lru 0.16.4 → 0.18.1 升级导致 Dependabot 解析失败(PR #6 已关闭,
    # Dependabot 仍尝试 recreate)。暂时忽略,后续手动升级。
    ignore:
      - dependency-name: "lru"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
