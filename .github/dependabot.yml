# v1.0.1 P0#02: enable Dependabot for the three dependency surfaces
# we ship (Rust crates in src-tauri, Node packages at the repo root,
# and the GitHub Actions we pin in .github/workflows/). Weekly cadence
# matches the cadence of the security audit job (see test.yml).
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    # Keep PRs reviewable — one Cargo update per week.
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    # 忽略有 breaking changes 的大版本升级,后续手动评估迁移
    ignore:
      - dependency-name: "lru"
      - dependency-name: "rand"        # 0.8→0.10 API 完全重构,24个编译错误
      - dependency-name: "aes-gcm"     # 0.10→0.11 from_slice 被弃用,需改 TryFrom

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    # 忽略有 breaking changes 的大版本升级
    ignore:
      - dependency-name: "typescript"                           # 6→7 大版本升级
      - dependency-name: "eslint"                               # 8→10 大版本升级
      - dependency-name: "@typescript-eslint/eslint-plugin"     # 6→8 大版本升级
      - dependency-name: "@typescript-eslint/parser"            # 6→8 大版本升级

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
