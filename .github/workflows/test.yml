name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Save the cache even when the Test step times out or fails.
          # Without this, a cold compile that hits the timeout never
          # persists its artifacts, so every subsequent run also cold
          # compiles (infinite loop).  `save-always` (v2.7+) breaks
          # that cycle by saving partial build artifacts.
          save-always: true
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: choco install -y --no-progress protoc 2>&1 | tail -n 5
      - name: Test
        working-directory: src-tauri
        # Cold compile of LanceDB/datafusion/arrow takes 60-90 min on
        # Windows/macOS.  60 min was too tight and caused a timeout
        # loop (see run #81).  120 min gives headroom for the first
        # cold compile; subsequent runs hit the cache and finish in
        # a few minutes.
        timeout-minutes: 120
        env:
          RUST_BACKTRACE: 1
        run: cargo test --features grpc,channels,did-identity,crdt-sync -- --test-threads=1 --nocapture
      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --features grpc,channels,did-identity,crdt-sync -- -D warnings
      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      # v1.0.1 P0#02: audit Rust dependencies against the RustSec
      # advisory database. `--locked` pins cargo-audit's own deps
      # to Cargo.lock so the install is reproducible.
      - name: Install cargo-audit
        working-directory: src-tauri
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        working-directory: src-tauri
        # `--deny warnings` would also fail on unmaintained crates
        # (warnings, not vulnerabilities); we keep audit at
        # vulnerability-level only so unmaintained crates can be
        # triaged in their own PR.
        run: cargo audit

  web:
    name: web-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - name: Upload coverage
        if: success()
        run: echo "coverage upload placeholder"
