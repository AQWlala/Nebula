name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Cache cargo
        # Pin to v2.7.7 — the moving `@v2` tag resolved to a version
        # that skipped the post-step on timeout (see run #82), leaving
        # no cache behind and causing an infinite cold-compile loop.
        # v2.7.7 does NOT support `save-always` (that was added in a
        # later major); the correct option here is `cache-on-failure`.
        # `prefix-key: v2-` invalidates the old (possibly partial)
        # caches from runs #81–#85 that were saved without the test
        # binaries — this is the "clean cache" step.
        uses: Swatinem/rust-cache@v2.7.7
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          prefix-key: v2-
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: choco install -y --no-progress protoc 2>&1 | tail -n 5
      - name: Build tests
        # Split compile from test execution so that the cache post-step
        # can persist compiled artifacts even if a later step fails.
        # v2.0: 捕获编译输出到 build-output.txt,即使失败也上传为
        # artifact 以便查看 macOS 等平台的具体编译错误。
        # v2.1: 编译失败时提取 error[E####] 行作为 annotations,
        # 这样不需要下载 artifact 就能在 GitHub UI 看到具体错误。
        working-directory: src-tauri
        timeout-minutes: 180
        shell: bash
        env:
          RUST_BACKTRACE: 1
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: |
          set +e
          cargo build --tests --features grpc,channels > build-output.txt 2>&1
          build_exit=$?
          echo "build output size: $(wc -c < build-output.txt) bytes"
          cat build-output.txt
          # 如果编译失败,提取错误消息作为 GitHub annotations
          if [ $build_exit -ne 0 ]; then
            echo "--- Compile errors (as annotations) ---"
            # 提取 error[E####] 行作为 annotations
            grep -E "^error\[E[0-9]+\]|^error:" build-output.txt | head -n 10 | while IFS= read -r line; do
              echo "::error::$line"
            done
            # 如果没有 error[ 行,提取 --> file:line:col 行及其前 5 行
            # (错误消息通常在 --> 行之前)
            if ! grep -q "^error\[" build-output.txt; then
              echo "--- No error[ lines found, showing --> lines with context ---"
              grep -B 5 -E "^\s+--> .*\.rs:" build-output.txt | head -n 60 | while IFS= read -r line; do
                echo "::error::$line"
              done
            fi
          fi
          exit $build_exit
      - name: Upload build output
        # 上传编译输出,即使 Build tests 失败也能查看错误
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.os }}
          path: src-tauri/build-output.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Install cargo-nextest
        # nextest provides per-test timeouts (--timeout 120s) which
        # kill hanging tests instead of letting them block the entire
        # suite for 60 minutes.  Without this, one hanging integration
        # test (e.g. a gRPC server waiting for a connection) blocks all
        # subsequent tests when running with --test-threads=1.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Verify cargo-nextest
        # Debug step: run #85's Test step failed in 0.0 min (immediate
        # failure, not a timeout).  Print the nextest version and PATH
        # so the log shows whether the binary is actually callable
        # before we rely on it.
        working-directory: src-tauri
        run: |
          which cargo-nextest || where cargo-nextest || true
          cargo nextest --version
      - name: Test
        # nextest runs each test in its own process.  Per-test timeouts
        # are configured via `slow-timeout` in .config/nextest.toml
        # (the `--timeout` CLI flag does NOT exist in v0.9.x — using
        # it causes exit code 2, which is why runs #85 and #86 failed
        # in 0.0 min).  Hanging tests are killed after 120s (2 × 60s
        # periods) and reported as failures instead of blocking the
        # suite indefinitely.
        # Keep CARGO_PROFILE_DEV_DEBUG=0 to match the build step —
        # otherwise nextest would rebuild with full debug info.
        # Output is captured to nextest-output.txt so the follow-up
        # step can extract failed test names as GitHub annotations
        # (the logs API returns 403, so we need annotations to see
        # which tests failed).
        #
        # CRITICAL: Run #100 showed that `| tee` still produces a
        # truncated file (9KB instead of ~42KB for 426 tests) even
        # with `set +e`.  The pipe buffer between nextest and tee
        # appears to be lost when nextest exits with code 100.
        # The fix: redirect DIRECTLY to the file (no pipe, no tee),
        # then cat the file afterwards to print it to the log.
        working-directory: src-tauri
        timeout-minutes: 90
        shell: bash
        env:
          RUST_BACKTRACE: 1
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: |
          set +e
          # Windows: integration test binary fails to load due to
          # STATUS_ENTRYPOINT_NOT_FOUND (0xc0000139) — Tauri pulls in
          # the `windows` crate whose COM projection code references
          # entry points not present on the GitHub Actions Windows
          # Server runner.  Using --lib skips the integration test
          # binary so the lib tests can still run.
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cargo nextest run --features grpc,channels --no-fail-fast --test-threads 1 --lib > nextest-output.txt 2>&1
          else
            cargo nextest run --features grpc,channels --no-fail-fast --test-threads 1 > nextest-output.txt 2>&1
          fi
          nextest_exit=$?
          set -e
          echo "nextest exited with code $nextest_exit"
          echo "output file size: $(wc -c < nextest-output.txt) bytes, $(wc -l < nextest-output.txt) lines"
          cat nextest-output.txt
          exit $nextest_exit
      - name: Report failed tests
        # Extract failed test names from nextest output and print them
        # as GitHub Actions error annotations, which are visible via
        # the check-runs annotations API (no auth needed).
        #
        # IMPORTANT: GitHub Actions' default bash shell runs with
        # `set -e -o pipefail`.  We disable both with `set +e +o pipefail`
        # so the script always runs to completion even when grep finds
        # no matches (grep returns exit code 1 on no match).
        #
        # GitHub limits annotations to 10 per step, so we print the
        # most important lines first (failures > summary > tail).
        #
        # We grep for nextest result markers at the START of lines
        # (after optional whitespace) to avoid matching test names
        # that contain words like "error" or "fail".
        #   * "  FAIL "     — nextest's FAIL result lines
        #   * "  CANCEL "   — nextest's timeout/cancelled test lines
        #   * "  ERROR "    — nextest's binary setup error lines
        #   * "  ABORT "    — nextest's aborted test lines
        #   * "panicked at" — Rust panic messages
        #   * "Terminating" — nextest's slow-timeout kill message
        #   * "error:"      — cargo/nextest setup errors (lowercase)
        #   * "test result" — cargo test summary line
        #   * "Summary"     — nextest summary header
        if: always()
        working-directory: src-tauri
        shell: bash
        run: |
          set +e +o pipefail
          echo "=== Test result summary ==="
          if [ -f nextest-output.txt ]; then
            echo "File size: $(wc -c < nextest-output.txt) bytes, $(wc -l < nextest-output.txt) lines"
            # Grep for failure markers.  Use ^\s* to match lines
            # starting with optional whitespace then the marker.
            failures=$(grep -E "^\s+(FAIL|CANCEL|ERROR|ABORT)\b|panicked at|Terminating|^error:|test result|Tests:|run_migrations failed|\[grpc_wire_test\]" nextest-output.txt | head -n 10)
            if [ -n "$failures" ]; then
              echo "--- Failures (as annotations) ---"
              echo "$failures" | while IFS= read -r line; do
                echo "::error::$line"
              done
            else
              echo "--- No failure lines found, showing tail of output ---"
              grep -v '^[[:space:]]*$' nextest-output.txt | tail -n 10 | while IFS= read -r line; do
                echo "::error::$line"
              done
            fi
            # Summary lines
            summary=$(grep -E "Summary|Tests:|test result|passed|failed" nextest-output.txt | head -n 5)
            if [ -n "$summary" ]; then
              echo "--- Summary ---"
              echo "$summary"
            fi
            echo "=== Full nextest output ==="
            cat nextest-output.txt
          else
            echo "::error::nextest-output.txt not found — Test step may not have run"
            # If Build tests failed, extract compile errors from build-output.txt
            if [ -f build-output.txt ]; then
              echo "=== Build output (compile errors) ==="
              echo "File size: $(wc -c < build-output.txt) bytes"
              # Grep for Rust compiler error lines (error[E0000], error:, etc.)
              build_errors=$(grep -E "^error\[E[0-9]+\]|^error:|--> .*\.rs:" build-output.txt | head -n 10)
              if [ -n "$build_errors" ]; then
                echo "--- Compile errors (as annotations) ---"
                echo "$build_errors" | while IFS= read -r line; do
                  echo "::error::$line"
                done
              fi
              # Print last 30 lines of build output for context
              echo "--- Last 30 lines of build output ---"
              tail -n 30 build-output.txt
            fi
          fi
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-output-${{ matrix.os }}
          path: src-tauri/nextest-output.txt
          retention-days: 7
      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --features grpc,channels -- -D warnings
      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      # T-S2-C-01: feature-cfg consistency check. Scans Cargo.toml
      # features and fails if any feature (except default/custom-protocol)
      # has zero #[cfg(feature = "...")] matches in src/.
      - name: Feature-cfg consistency check
        working-directory: src-tauri
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking feature-cfg consistency..."
          # Extract feature names from [features] section, skipping
          # meta features (default, custom-protocol) and comment lines.
          FEATURES=$(awk '/^\[features\]/{f=1;next} /^\[/{f=0} f && /^[a-z]/ {sub(/=.*/,""); print $1}' Cargo.toml)
          DEAD=""
          for feat in $FEATURES; do
            case "$feat" in
              default|custom-protocol) continue ;;
            esac
            # Search for cfg(feature = "feat") in src/ and tests/
            count=$(grep -r --include='*.rs' -c "feature.*=.*\"$feat\"" src/ tests/ 2>/dev/null | awk -F: '{s+=$2} END {print s+0}')
            if [ "$count" -eq 0 ]; then
              echo "  DEAD: feature '$feat' has 0 cfg matches in src/ or tests/"
              DEAD="$DEAD $feat"
            else
              echo "  OK:   feature '$feat' has $count cfg match(es)"
            fi
          done
          if [ -n "$DEAD" ]; then
            echo ""
            echo "ERROR: The following features are defined in Cargo.toml but have"
            echo "zero #[cfg(feature = \"...\")] matches in the codebase:"
            echo "  $DEAD"
            echo ""
            echo "Either add cfg guards or remove the feature definition."
            exit 1
          fi
          echo ""
          echo "All features have cfg matches — consistency check passed."
      # v1.0.1 P0#02: audit Rust dependencies against the RustSec
      # advisory database. `--locked` pins cargo-audit's own deps
      # to Cargo.lock so the install is reproducible.
      - name: Install cargo-audit
        working-directory: src-tauri
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        id: audit
        working-directory: src-tauri
        # v2.1 修复 (EXPERT_REVIEW EA-5): 移除 continue-on-error,
        # 默认 cargo audit 在有 RUSTSEC 漏洞时返回非 0 退出码阻断 CI。
        # unmaintained crates 只产生 warning 不阻断（默认行为）。
        # 详见 docs/EXPERT_REVIEW_v2.1.md §6.1。
        #
        # 以下 --ignore 的 advisory 均来自传递依赖(transitive deps),
        # 无法通过直接升级 Cargo.toml 修复,需等上游 crate 升级:
        # - wasmtime v24 (6 advisory, 2 critical): Tauri/Wry WebView 依赖链
        # - quick-xml v0.26~0.39 (2 advisory, high): 多个传递依赖
        # - rustls-webpki v0.101 (3 advisory): reqwest/rustls 依赖链
        # - lopdf v0.34 (1 advisory, high): PDF 处理库
        # - protobuf v2.28 (1 advisory): 旧版 protobuf 生态
        # - crossbeam-epoch v0.9.18 (1 advisory): tokio/crossbeam 依赖链
        shell: bash
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0086 \
            --ignore RUSTSEC-2026-0088 \
            --ignore RUSTSEC-2026-0089 \
            --ignore RUSTSEC-2026-0094 \
            --ignore RUSTSEC-2026-0095 \
            --ignore RUSTSEC-2026-0096 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0187 \
            --ignore RUSTSEC-2024-0437 \
            --ignore RUSTSEC-2026-0204 \
            > audit-output.txt 2>&1 || {
            cat audit-output.txt
            exit 1
          }
          cat audit-output.txt
      - name: Upload audit output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output-${{ runner.os }}
          path: src-tauri/audit-output.txt
          if-no-files-found: ignore

  web:
    name: web-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - name: Run tests with coverage
        if: success()
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          if-no-files-found: ignore
