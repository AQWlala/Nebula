## cargo-nextest configuration.
##
## Run #85 and #86 failed with exit code 2 because the `--timeout`
## CLI flag does NOT exist in cargo-nextest v0.9.x.  Per-test
## timeouts must be configured here, in a profile.
##
## `slow-timeout` with `terminate-after` is the correct mechanism:
## after `period` (30s) the test is marked SLOW, and after
## `terminate-after` periods (2 × 30s = 60s) it is killed.
##
## Run #94: reduced from 120s to 60s — tests that need >60s are
## almost certainly stuck on a network call or dead port.

[profile.default]
slow-timeout = { period = "30s", terminate-after = 2 }
