# rust-toolchain.toml
# Nebula Rust 工具链配置
#
# 使用平台无关的 "stable" channel: rustup 在每个平台上自动选择
# 对应的 host target (Windows=msvc, Linux=gnu, macOS=darwin)。
#
# 之前固定 "stable-x86_64-pc-windows-msvc" 会导致 macOS/Linux CI
# runner 报错: "target tuple in channel name 'stable-x86_64-pc-windows-msvc'"。
#
# Windows 开发者若本地装了 MinGW 工具链导致链接器冲突,
# 请手动运行 `rustup default stable-x86_64-pc-windows-msvc` 覆盖,
# 而不是在此文件中固定 Windows-only channel。
# 需先安装 "Build Tools for Visual Studio"
# (https://visualstudio.microsoft.com/visual-cpp-build-tools/),
# 勾选 "Desktop development with C++" 工作负载。

[toolchain]
channel = "stable"
targets = ["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu", "x86_64-apple-darwin"]
profile = "default"
components = ["rustfmt", "clippy"]
